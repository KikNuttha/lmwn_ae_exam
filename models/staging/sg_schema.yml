version: 2

models:
  - name: sg_mst_customers
    columns:
      - name: customer_id 
        tests:
          - unique
          - not_null
      - name: signup_date
        tests:
          - not_null
      - name: customer_segment
        tests:
          - not_null
          - accepted_values:
              values: ['new','inactive','loyal','churn_risk']
      - name: current_status
        tests:
          - not_null
          - accepted_values:
              values: ['inactive','active']             
      - name: referral_source
        tests:
          - not_null
          - accepted_values:
              values: ['social','search','campaign','friend','ads']   
      - name: birth_year
        tests:
          - not_null
      - name: gender
        tests:
          - not_null
          - accepted_values:
              values: ['other','male','female'] 
      - name: preferred_device
        tests:
          - not_null
          - accepted_values:
              values: ['android','ios','web']

  - name: sg_mst_drivers
    columns:
      - name: driver_id
        tests:
          - unique
          - not_null
      - name: join_date
        tests:
        - not_null
      - name: vehicle_type
        tests:
          - not_null
          - accepted_values:
              values: ['car','bike','van']
      - name: region
        tests:
          - not_null
          - accepted_values:
              values: ['east','north','metro','central','south']
      - name: active_status
        tests:
          - not_null
          - accepted_values:
              values: ['inactive','active']
      - name: driver_rating
        tests:
          - not_null
      - name: bonus_tier
        tests:
          - not_null
          - accepted_values:
              values: ['gold','bronze','silver','platinum']

  - name: sg_mst_restaurants
    columns:
      - name: restaurant_id
        tests:
          - unique
          - not_null
      - name: restaurant_name
        tests:
          - not_null
      - name: category
        tests:
          - not_null
          - accepted_values:
              values: ['western','fast food','thai','vegan','japanese','coffee','bakery']
      - name: city
        tests:
          - not_null
          - accepted_values:
              values: ['bangkok','khon kaen','udon thani','hat yai','phuket','rayong','pattaya','chiang mai']
      - name: average_rating
        tests:
          - not_null
      - name: active_status
        tests:
          - not_null
          - accepted_values:
              values: ['active','inactive']
      - name: prep_time_min
        tests:
          - not_null

  - name: sg_mst_campaign
    columns:
      - name: campaign_id
        tests:
          - unique
          - not_null
      - name: campaign_name
        tests:
          - not_null
      - name: start_dt
        tests:
          - not_null
      - name: end_dt
        tests:
          - not_null
      - name: campaign_type
        tests:
          - not_null
          - accepted_values:
              values: ['seasonal','loyalty','retargeting','acquisition']
      - name: objective
        tests:
          - not_null
          - accepted_values:
              values: ['boost_new_customers','reactivate_lapsed','increase_orders']
      - name: channel
        tests:
          - not_null
          - accepted_values:
              values: ['google','tiktok','facebook','email']
      - name: budget
        tests:
          - not_null
      - name: cost_model
        tests:
          - not_null
          - accepted_values:
              values: ['cpm','cpv','cpc','cpa']
      - name: targeting_strategy
        tests:
          - not_null
          - accepted_values:
              values: ['custom','broad','lookalike']
      - name: is_active
        tests:
          - accepted_values:
              values: [true, false]

  - name: sg_trn_order
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: restaurant_id
        tests:
          - not_null
      - name: driver_id
        tests:
          - not_null
      - name: order_datetime
        tests:
          - not_null
      - name: pickup_datetime
        tests:
          - not_null   
      - name: delivery_datetime
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['failed','completed','canceled']
      - name: delivery_zone
        tests:
          - not_null
          - accepted_values:
              values: ['south','east','central','north']
      - name: total_amount
        tests:
          - not_null
      - name: payment_method
        tests:
          - not_null
          - accepted_values:
              values: ['mobile_wallet','cash','credit_card']
      - name: is_late_delivery
        tests:
          - accepted_values:
              values: [true, false]
      - name: delivery_distance_km
        tests:
          - not_null

  - name: sg_trn_support_tickets
    columns:
      - name: ticket_id
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: driver_id
        tests:
          - not_null
      - name: restaurant_id
        tests:
          - not_null
      - name: issue_type
        tests:
          - not_null
          - accepted_values:
              values: ['payment','rider','delivery','food']
      - name: issue_sub_type
        tests:
          - not_null
          - accepted_values:
              values: ['refund','cold','overcharged','no_mask','late','wrong_item','rude','not_delivered']
      - name: channel
        tests:
          - not_null
          - accepted_values:
              values: ['email','in_app','call']
      - name: opened_datetime
        tests:
          - not_null
      - name: resolved_datetime
        tests:
          - not_null
      - name: current_status
        tests:
          - not_null
          - accepted_values:
              values: ['resolved']
      - name: csat_score
        tests:
          - not_null
      - name: compensation_amount
        tests:
          - not_null
      - name: resolved_by_agent_id
        tests:
          - not_null
  
  - name: sg_log_support_tickets
    columns:
      - name: ticket_id
        tests:
          - not_null
      - name: action_status
        tests:
          - not_null
          - accepted_values:
              values: ['opened','resolved']
      - name: status_datetime
        tests:
          - not_null
      - name: agent_id
        tests:
          - not_null

  - name: sg_log_camp_interac
    columns:
      - name: interaction_id
        tests:
          - unique
          - not_null
      - name: campaign_id
        tests:
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: interaction_dt
        tests:
          - not_null
      - name: event_type
        tests:
          - not_null
          - accepted_values:
              values: ['impression','click','conversion']
      - name: platform
        tests:
          - not_null
          - accepted_values:
              values: ['tiktok','facebook','google']
      - name: device_type
        tests:
          - not_null
          - accepted_values:
              values: ['web','android','ios']
      - name: ad_cost
        tests:
          - not_null
      - name: order_id
        tests:
          - unique
          - not_null
      - name: is_new_customer
        tests:
          - accepted_values:
              values: [true, false]
      - name: revenue
        tests:
          - not_null
      - name: session_id
        tests:
          - not_null

  - name: sg_log_order
    columns:
      - name: order_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['picked_up', 'failed','completed','created','accepted','canceled']
      - name: status_datetime
        tests:
          - not_null
      - name: updated_by
        tests:
          - not_null

  - name: sg_log_driver_incentive
    columns:
      - name: log_id
        tests:
          - unique
          - not_null
      - name: driver_id
        tests:
          - not_null
      - name: incentive_program
        tests:
          - not_null
          - accepted_values:
              values: ['rainy_day', 'weekly_bonus','holiday_special']
      - name: bonus_amount
        tests:
          - not_null
      - name: applied_date
        tests:
          - not_null
      - name: delivery_target
        tests:
          - not_null
      - name: actual_deliveries
        tests:
          - not_null
      - name: bonus_qualified
        tests:
          - accepted_values:
              values: [true, false]
      - name: region
        tests:
          - not_null
          - accepted_values:
              values: ['north', 'metro','south','east','central']