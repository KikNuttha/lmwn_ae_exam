version: 2

models:
  - name: sg_mst_customers
    columns:
      - name: customer_id 
        tests:
          - unique
          - not_null
      - name: signup_date
        tests:
          - not_null
      - name: customer_segment
        tests:
          - not_null
          - accepted_values:
              values: ['new','inactive','loyal','churn_risk']
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['inactive','active']             
      - name: referral_source
        tests:
          - not_null
          - accepted_values:
              values: ['social','search','campaign','friend','ads']   
      - name: birth_year
        tests:
          - not_null
      - name: gender
        tests:
          - not_null
          - accepted_values:
              values: ['other','male','female'] 
      - name: preferred_device
        tests:
          - not_null
          - accepted_values:
              values: ['android','ios','web']

  - name: sg_mst_drivers
    columns:
      - name: driver_id
        tests:
          - unique
          - not_null
      - name: join_date
        tests:
        - not_null
      - name: vehicle_type
        tests:
          - not_null
          - accepted_values:
              values: ['car','bike','van']
      - name: region
        tests:
          - not_null
          - accepted_values:
              values: ['east','north','metro','central','south']
      - name: active_status
        tests:
          - not_null
          - accepted_values:
              values: ['inactive','active']
      - name: driver_rating
        tests:
          - not_null
      - name: bonus_tier
        tests:
          - not_null
          - accepted_values:
              values: ['gold','bronze','silver','platinum']